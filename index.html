<!doctype html>
<html lang="en">
  <head>
    <!-- Basic page setup -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>

    <!-- External stylesheet -->
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <!-- Page header -->
    <header>
      <h1>Expense Tracker</h1>
      <p>Add, filter, sort, and save personal expenses.</p>
    </header>

    <!-- Main app content -->
    <main>
      <!-- Expense form section -->
      <section>
        <h2>Add Expense</h2>

        <form id="expense-form">
          <label for="description">Description</label>
          <input type="text" id="description" name="description" />

          <label for="amount">Amount</label>
          <input type="number" id="amount" name="amount" min="0" step="0.01" />

          <label for="category">Category</label>
          <select id="category" name="category">
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Other">Other</option>
          </select>

          <label for="date">Date</label>
          <input type="date" id="date" name="date" />

          <button type="submit">Add Expense</button>

          <!-- Inline validation error message -->
          <p id="form-error"></p>
        </form>
      </section>

      <!-- Controls section for filtering and sorting -->
      <section>
        <h2>Controls</h2>

        <label for="filter-category">Filter by Category</label>
        <select id="filter-category">
          <option value="All">All</option>
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Other">Other</option>
        </select>

        <label for="sort-option">Sort Expenses</label>
        <select id="sort-option">
          <option value="date-desc">Date: Newest First</option>
          <option value="date-asc">Date: Oldest First</option>
          <option value="amount-desc">Amount: High to Low</option>
          <option value="amount-asc">Amount: Low to High</option>
        </select>
      </section>

      <!-- Totals section -->
      <section>
        <h2>Totals</h2>

        <p>Overall Total: <span id="overall-total">$0.00</span></p>
        <p>Expense Count: <span id="expense-count">0</span></p>

        <h3>Category Totals</h3>
        <ul id="category-totals"></ul>

        <!-- Async currency conversion -->
        <button id="convert-button">Convert to EUR</button>
        <p id="converted-total"></p>
        <p id="conversion-error"></p>
      </section>

      <!-- Expense list section -->
      <section>
        <h2>Expenses</h2>

        <!-- Empty state message -->
        <p id="empty-message">No expenses added yet.</p>

        <!-- Expense rows will be rendered here by JavaScript -->
        <div id="expense-list"></div>
      </section>
    </main>

    <!-- Page footer -->
    <footer>
      <p>CSCI 39548 Assignment 2</p>
    </footer>

    <!-- External JavaScript file -->
    <script src="script.js"></script>
  </body>
</html>
